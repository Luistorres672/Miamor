<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuestra Historia ✨🌻</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; }

        :root {
            --color-bg-overlay: rgba(2, 6, 23, 0.85);
            --line-color: linear-gradient(to left top, #82ff86 20%, #144425, #104e1c);
            --flower-center: radial-gradient(circle, #000, #ff5e00);
            --petal-color: radial-gradient(circle, #ff5e00, #ffbb00);
            --leaf-color: radial-gradient(circle, #82ff86, #104e1c);
            --text-color: #ffffff;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-yellow: #facc15;
            --accent-purple: #9333ea; 
            --ribbon-color: #be123c;
        }

        body {
            background-color: #020617;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: "Poppins", sans-serif;
            color: white;
        }

        /* --- Fondos y Capas --- */
        #fireworks-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--color-bg-overlay);
            z-index: -1;
        }

        /* --- Estructura del Contenedor Principal --- */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            width: 100%;
            height: 100vh;
            z-index: 10;
        }

        .content-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            width: 95%;
            max-width: 1400px;
            margin-top: 60px;
            display: none;
        }

        .container.active .content-layout {
            display: flex;
        }

        /* --- Sección del Texto --- */
        .text-section {
            width: 35%;
            color: var(--text-color);
            font-weight: 300;
            font-size: clamp(0.75rem, 2.5vw, 0.95rem);
            line-height: 1.8;
            padding: 25px;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            max-height: 70vh;
            overflow-y: auto;
            border-left: 4px solid var(--accent-yellow);
            opacity: 0;
            transition: opacity 1s ease;
        }
        .container.active .text-section { opacity: 1; }

        /* --- Sección de la Foto --- */
        .photo-frame {
            position: relative;
            width: 300px;
            background: white;
            padding: 12px 12px 50px 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
            border: 1px solid #ddd;
            display: none;
            transform: rotate(2deg);
        }

        .photo-frame img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            filter: sepia(0.1);
            transition: opacity 1s ease-in-out;
        }

        .photo-frame::after {
            content: "Nuestros Momentos ✨";
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #333;
        }

        /* --- SECCIÓN DEL RAMO (ESTILO NUEVO) --- */
        .bouquet {
            position: relative;
            height: 450px;
            width: 350px;
            animation: sway 7s ease-in-out infinite;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }
        .container.active .bouquet { opacity: 1; }

        .sunflower { position: absolute; bottom: 0; left: 50%; transform-origin: bottom center; }
        .sunflower--1 { transform: translateX(-50%) scale(0.7); z-index: 15; --base-delay: 0.4s; }
        .sunflower--2 { transform: translateX(-130%) rotate(-20deg) scale(0.6); z-index: 10; --base-delay: 0.2s; }
        .sunflower--3 { transform: translateX(30%) rotate(20deg) scale(0.6); z-index: 10; --base-delay: 0.6s; }
        
        .flower_stem { 
            width: 15px; 
            height: 350px; 
            background: var(--line-color); 
            border-radius: 15px; 
            margin: 0 auto; 
        }

        .flower_center { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0); 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            background: var(--flower-center); 
            z-index: 20; 
            opacity: 0;
        }
        .container.active .flower_center { 
            animation: open-flower-center 1s ease-out forwards; 
            animation-delay: calc(var(--base-delay) + 1s); 
        }

        .flower_petal { 
            position: absolute; 
            width: 50px; 
            height: 100px; 
            background: var(--petal-color); 
            clip-path: ellipse(35% 50% at 50% 50%); 
            top: -50px; 
            left: 50%; 
            transform-origin: center bottom; 
            z-index: 10; 
            opacity: 0; 
        }
        .container.active .flower_petal { 
            animation: open-flower-petal 1s ease-out forwards; 
        }

        /* --- Hojas del tallo --- */
        .flower_leaf {
            position: absolute;
            width: 50px;
            height: 90px;
            background: var(--leaf-color);
            border-radius: 100px 20px 100px 20px;
            transform-origin: center bottom;
            opacity: 0;
            transition: opacity 1s ease 2s;
        }
        .container.active .flower_leaf { opacity: 1; }
        .flower_leaf-1 { left: 50%; bottom: 120px; transform: translateX(10%) rotate(60deg); }
        .flower_leaf-2 { left: 50%; bottom: 180px; transform: translateX(-110%) rotate(-60deg); }

        /* --- Elementos de decoración del ramo --- */
        .bouquet_accent {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent-purple);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 1s ease 2s;
        }
        .container.active .bouquet_accent { opacity: 1; }
        .bouquet_accent--1 { bottom: 180px; left: 50%; transform: translateX(-120px); animation: pulsepurple 3s infinite 2s; }
        .bouquet_accent--2 { bottom: 220px; left: 50%; transform: translateX(100px); animation: pulsepurple 3s infinite 2.5s; }

        .bouquet_ribbon {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 25px;
            background: var(--ribbon-color);
            border-radius: 5px;
            z-index: 16;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }
        .container.active .bouquet_ribbon { opacity: 1; }

        /* --- Temporizador --- */
        #timer {
            position: fixed;
            top: 30px;
            color: #fff;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 10px 25px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            opacity: 0;
            transition: all 1s ease;
            z-index: 30;
        }
        .container.active #timer { opacity: 1; }

        #initial-message {
            color: #f1f5f9;
            font-size: 1.4rem;
            font-family: 'Dancing Script', cursive;
            margin-bottom: 2rem;
            text-align: center;
        }

        .flower-btn {
            padding: 15px 45px;
            font-size: 1.1rem;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(45deg, #ffbb00, #ff5e00);
            border: none;
            border-radius: 50px;
            z-index: 30;
            transition: 0.5s;
            position: relative;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }
        .flower-btn:hover { transform: scale(1.05); }

        .sparkle { position: fixed; width: 4px; height: 4px; background: white; border-radius: 50%; pointer-events: none; animation: fade 0.8s forwards; z-index: 100; }
        #heart-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 8; }
        .heart { position: absolute; animation: heartFall linear forwards; }

        /* Animaciones del Nuevo Estilo */
        @keyframes open-flower-petal {
            0% { transform: translateX(-50%) translateY(50px) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(-50%) translateY(0) rotate(var(--rotate-deg)); opacity: 1; }
        }

        @keyframes open-flower-center {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        @keyframes sway { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
        @keyframes fade { to { opacity: 0; transform: scale(0); } }
        @keyframes heartFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes pulsepurple { 0%, 100% { opacity: 0.5; transform: scale(1) translateX(var(--tx)); } 50% { opacity: 1; transform: scale(1.5) translateX(var(--tx)); } }

        @media (max-width: 900px) {
            .content-layout { flex-direction: column; align-items: center; margin-top: 20px; }
            .text-section { width: 90%; margin-bottom: 20px; max-height: 30vh; }
            .photo-frame { width: 240px; margin-bottom: 20px; }
            .bouquet { transform: scale(0.6); height: 300px; margin-top: -50px; }
        }
    </style>
</head>
<body>
    
    <canvas id="fireworks-canvas"></canvas>
    <div class="overlay"></div>

    <audio id="song" src="Flores Amarillas - Floricienta - High Quality.mp3" loop></audio>
    <div id="heart-rain"></div>

    <div class="container" id="main-container">
        <div id="timer">Calculando tiempo...</div>
        <p id="initial-message">Tengo algo especial para ti...</p>
        
        <button class="flower-btn" id="flower-btn">Abrir Sorpresa</button>
        
        <div class="content-layout" id="content-layout">
            
            <div class="text-section">
                <p id="typewriter"></p>
            </div>

            <div class="photo-frame" id="photo-frame">
                <img id="current-photo" src="" alt="Nuestra foto">
            </div>

            <div class="bouquet" id="bouquet">
                <div class="bouquet_ribbon"></div>
                
                <div class="bouquet_accent bouquet_accent--1" style="--tx: -120px;"></div>
                <div class="bouquet_accent bouquet_accent--2" style="--tx: 100px;"></div>

                <!-- Flor 2 (Izquierda) -->
                <div class="sunflower sunflower--2">
                    <div class="flower_wrapper">
                        <div class="flower_stem"></div>
                        <div class="flower_leaf flower_leaf-1"></div>
                        <div class="flower_leaf flower_leaf-2"></div>
                        <div class="flower_center"></div>
                    </div>
                </div>
                
                <!-- Flor 3 (Derecha) -->
                <div class="sunflower sunflower--3">
                    <div class="flower_wrapper">
                        <div class="flower_stem"></div>
                        <div class="flower_center"></div>
                    </div>
                </div>
                
                <!-- Flor 1 (Centro) -->
                <div class="sunflower sunflower--1">
                    <div class="flower_wrapper">
                        <div class="flower_stem"></div>
                        <div class="flower_center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const totalFotos = 22;
        let fotos = Array.from({length: totalFotos}, (_, i) => `foto${i+1}.jpeg`);
        const startDate = new Date(2023, 9, 31);
        const messageText = "Desde aquel 31 de octubre, mi vida cambió de una manera que nunca imaginé. Cada momento a tu lado es un recuerdo que atesoro. Contigo aprendí que la felicidad está en lo sencillo: una mirada, tu paz, tu forma de hacerme sentir bien. Te has convertido en mi refugio, ese lugar al que siempre quiero volver. Gracias por ser mi alegría en los días grises y llenar mi vida de luz. Te amo muchísimo ✨❤️";

        const photoImg = document.getElementById('current-photo');
        const photoFrame = document.getElementById('photo-frame');
        const flowerBtn = document.getElementById("flower-btn");
        const mainContainer = document.getElementById("main-container");
        const audio = document.getElementById("song");
        const typewriterElement = document.getElementById("typewriter");
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        const initialMessage = document.getElementById('initial-message');

        let particles = [];
        const colors = ['#FFD700', '#FF69B4', '#00BFFF', '#ADFF2F', '#FFFFFF'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vel = { x: (Math.random() - 0.5) * 6, y: (Math.random() - 0.5) * 6 };
                this.alpha = 1;
            }
            draw() { ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }
            update() { this.x += this.vel.x; this.y += this.vel.y; this.alpha -= 0.01; }
        }

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.5);
            for(let i=0; i<30; i++) particles.push(new FireworkParticle(x, y, colors[Math.floor(Math.random() * colors.length)]));
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1); });
            requestAnimationFrame(animate);
        }

        let currentIdx = 0;
        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
        shuffle(fotos);

        function changePhoto() {
            photoImg.style.opacity = 0;
            setTimeout(() => {
                photoImg.src = fotos[currentIdx];
                photoImg.style.opacity = 1;
                currentIdx = (currentIdx + 1) % fotos.length;
                photoFrame.style.transform = `rotate(${(Math.random() * 6) - 3}deg)`;
            }, 500);
        }

        function updateTimer() {
            const diff = new Date() - startDate;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `Juntos hace: ${d}d ${h}h ${m}m ${s}s`;
        }

        function typeWriter(text, i = 0) {
            if (i < text.length) {
                typewriterElement.innerHTML += text.charAt(i);
                typewriterElement.scrollTop = typewriterElement.scrollHeight;
                let speed = (text.charAt(i) === '.' || text.charAt(i) === '!' || text.charAt(i) === '?') ? 400 : 50;
                setTimeout(() => typeWriter(text, i + 1), speed);
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = Math.random() > 0.5 ? '🌻' : '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.getElementById('heart-rain').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }

        // Generar pétalos con el nuevo estilo y retraso
        document.querySelectorAll('.sunflower').forEach(flower => {
            const wrapper = flower.querySelector('.flower_wrapper');
            const flowerDelay = parseFloat(getComputedStyle(flower).getPropertyValue('--base-delay')) || 0;
            
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'flower_petal';
                p.style.setProperty('--rotate-deg', `${i * 30}deg`);
                // Combinamos el retraso de la flor con el retraso individual del pétalo
                p.style.animationDelay = `${flowerDelay + 1.2 + (i * 0.05)}s`;
                wrapper.appendChild(p);
            }
        });

        document.addEventListener('mousemove', (e) => {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 800);
        });

        flowerBtn.addEventListener('click', () => {
            mainContainer.classList.add("active");
            audio.volume = 0.4;
            audio.play();
            
            flowerBtn.style.display = 'none';
            initialMessage.style.display = 'none';
            
            photoFrame.style.display = 'block';
            changePhoto();
            setInterval(changePhoto, 5000);
            
            setInterval(updateTimer, 1000);
            updateTimer();
            animate();
            setInterval(createFirework, 2000);

            setTimeout(() => {
                typeWriter(messageText);
                setInterval(createHeart, 400);
            }, 3000);
        });
    </script>
</body>
</html>
